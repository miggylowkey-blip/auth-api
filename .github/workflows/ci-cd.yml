name: CI / CD

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ci:
    name: Lint, test, build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Verify formatting
        run: test -z "$(gofmt -l -e .)"

      - name: Vet and test
        run: |
          go vet ./...
          go test ./... -count=1 -race -shuffle=on

      - name: Production-style build (matches Docker compile flags roughly)
        run: CGO_ENABLED=0 go build -trimpath -ldflags="-s -w" -o ./auth-api .

      - name: Validate Dockerfile builds
        run: docker build -t auth-api:ci .

  publish:
    name: Publish image (GHCR)
    needs: ci
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    env:
      REGISTRY: ghcr.io

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image name (lowercase)
        id: image
        run: echo "name=${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"
        shell: bash

      - name: Compute tags
        id: meta
        env:
          IMAGE: ${{ env.REGISTRY }}/${{ steps.image.outputs.name }}
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            ver="${GITHUB_REF#refs/tags/v}"
            echo "tags=${IMAGE}:${ver},${IMAGE}:latest" >> "$GITHUB_OUTPUT"
            echo "scan_ref=${IMAGE}:${ver}" >> "$GITHUB_OUTPUT"
          else
            short="$(git rev-parse --short HEAD)"
            echo "tags=${IMAGE}:${short},${IMAGE}:latest" >> "$GITHUB_OUTPUT"
            echo "scan_ref=${IMAGE}:${short}" >> "$GITHUB_OUTPUT"
          fi
        shell: bash

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}

      - name: Scan pushed image (Trivy)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ${{ steps.meta.outputs.scan_ref }}
          format: table
          exit-code: 1
          severity: HIGH,CRITICAL

        - name Validate Dockerfile builds  
        run: docker build -t auth-api:ci .

        - name Scan Docker image (Trivy)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: auth-api:ci
          format: table
          exit-code: 1
          severity: HIGH,CRITICAL
          ignore-unfixed: true