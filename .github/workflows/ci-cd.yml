name: CI / CD

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ci:
    name: Lint, test, build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Verify formatting
        run: test -z "$(gofmt -l -e .)"

      - name: Vet and test
        run: |
          go vet ./...
          go test ./... -count=1 -race -shuffle=on

      - name: Production-style build (matches Docker compile flags roughly)
        run: CGO_ENABLED=0 go build -trimpath -ldflags="-s -w" -o ./auth-api .

      - name: Validate Dockerfile builds
        run: docker build -t auth-api:ci .

  publish:
    name: Publish image (GHCR)
    needs: ci
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    env:
      REGISTRY: ghcr.io

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image name (lowercase)
        id: image
        run: echo "name=${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"
        shell: bash

      - name: Build and push
        env:
          IMAGE: ${{ env.REGISTRY }}/${{ steps.image.outputs.name }}
        run: |
          set -euo pipefail
          docker build -t "${IMAGE}:build" .
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            ver="${GITHUB_REF#refs/tags/v}"
            docker tag "${IMAGE}:build" "${IMAGE}:${ver}"
            docker tag "${IMAGE}:build" "${IMAGE}:latest"
            docker push "${IMAGE}:${ver}"
            docker push "${IMAGE}:latest"
          else
            short="$(git rev-parse --short HEAD)"
            docker tag "${IMAGE}:build" "${IMAGE}:${short}"
            docker tag "${IMAGE}:build" "${IMAGE}:latest"
            docker push "${IMAGE}:${short}"
            docker push "${IMAGE}:latest"
          fi
        shell: bash
